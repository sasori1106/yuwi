<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="yuwi.css" />
    <title>Dear Yuwi</title>
  </head>
  <body>
    <div class="container">
      <div class="envelope" id="envelope">
        <div class="letter" id="letter">
          <h2>Open Me</h2>
        </div>

        <div class="front"></div>
        <div class="flap"></div>
      </div>
    </div>

    <div class="letter-overlay" id="letterOverlay">
      <div class="full-letter">
        <button class="close-btn" id="closeBtn">&times;</button>
        <div class="full-letter-content">
          <h2>Dear Yuwi,</h2>
          <p>Write your message here...</p>
        </div>
      </div>
    </div>

    <script src="yuwi.js"></script>
  </body>
</html>
